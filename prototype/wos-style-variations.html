<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WoS Style Variations</title>
<style>
  @font-face{font-family:Chakra;src:url("assets/fonts/chakra-petch-700.ttf") format("truetype");font-weight:700}
  @font-face{font-family:Plex;src:url("assets/fonts/ibm-plex-mono-500.ttf") format("truetype");font-weight:500}
  *{box-sizing:border-box}
  body{margin:0;background:#d7eaf5;color:#20324a;font-family:system-ui,-apple-system,Segoe UI,sans-serif}
  .wrap{max-width:1500px;margin:0 auto;padding:22px}
  .intro{font-family:Chakra,system-ui;font-size:18px;letter-spacing:.08em;color:#12385e;margin:0 0 16px;text-transform:uppercase}
  .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;align-items:start}
  .variant{border-radius:18px;overflow:hidden;box-shadow:0 18px 40px rgba(25,70,110,.25)}
  .label{font-family:Chakra,system-ui;font-size:14px;letter-spacing:.1em;text-transform:uppercase;padding:11px 14px}
  .app{padding:12px;min-height:760px}
  .top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .badge{font-family:Chakra,system-ui;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
  .run{margin-left:auto;border:0;border-radius:12px;padding:9px 13px;font-family:Chakra,system-ui;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
  .scenario,.panel,.forecast,.skill,.stat{border-radius:14px;margin-bottom:12px}
  .scenario{display:flex;align-items:center;gap:8px;padding:10px}
  .scenario b{font-family:Chakra,system-ui}
  .scenario img,.role img{width:18px;height:18px;object-fit:contain}
  .tools{margin-left:auto;display:flex;gap:5px}
  .tool{width:26px;height:26px;border-radius:8px;display:grid;place-items:center}
  .panel{padding:12px}
  .side{display:grid;grid-template-columns:1fr 54px 1fr;align-items:center;gap:10px;margin-bottom:12px}
  .side-name{font-family:Chakra,system-ui;letter-spacing:.12em;text-transform:uppercase;text-align:center}
  .vs{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;font-family:Chakra,system-ui;justify-self:center}
  .role{display:inline-flex;gap:4px;border-radius:12px;padding:3px;margin-top:6px}
  .role span{width:34px;height:30px;border-radius:9px;display:grid;place-items:center}
  .title{font-family:Chakra,system-ui;font-size:12px;letter-spacing:.12em;text-transform:uppercase;margin:14px 0 8px;display:flex;align-items:center}
  .chev{margin-left:auto;width:30px;height:28px;border-radius:8px;display:grid;place-items:center}
  .form-row{display:grid;grid-template-columns:38px 1fr 52px;gap:8px;align-items:center;margin-bottom:8px;padding:8px;border-radius:12px}
  .class-icon{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;font-family:Chakra,system-ui}
  .track{height:10px;border-radius:999px;overflow:hidden}
  .track i{display:block;height:100%;border-radius:999px}
  .pct{font-family:Plex,monospace;text-align:right;font-size:12px}
  .total{text-align:right;font-family:Chakra,system-ui;font-size:21px;margin-top:2px}
  .heroes{display:grid;grid-template-columns:1fr 86px 1fr;gap:10px;align-items:center}
  .hero-stack{display:grid;gap:8px}
  .hero{display:flex;align-items:center;gap:8px;border-radius:999px;padding:5px 10px 5px 5px;font-family:Chakra,system-ui;font-size:13px}
  .hero img{width:30px;height:30px;border-radius:50%;object-fit:cover}
  .joiners{display:flex;gap:6px;white-space:nowrap;justify-content:flex-end}
  .joiners .hero{font-size:12px;padding-right:8px}
  .joiners .hero img{width:26px;height:26px}
  .mid{text-align:center;font-family:Plex,monospace;font-size:10px;text-transform:uppercase;letter-spacing:.1em}
  .forecast{padding:12px}
  .prob{display:grid;grid-template-columns:120px 1fr;gap:12px;align-items:center}
  .num{font-family:Chakra,system-ui;font-size:44px;line-height:.9}
  .winbar{height:36px;border-radius:12px;display:flex;overflow:hidden}
  .winbar span{display:grid;place-items:center;font-family:Chakra,system-ui;font-size:13px}
  .mini-bars{display:flex;gap:6px;height:72px;align-items:end;margin-top:10px}
  .mini-bars i{flex:1;border-radius:7px 7px 0 0}
  .skill{overflow:hidden}
  .skill-head{display:grid;grid-template-columns:1fr 1fr}
  .skill-side{padding:10px;font-family:Chakra,system-ui;display:flex;align-items:center;gap:8px}
  .skill-side img{width:34px;height:34px;border-radius:6px}
  .skill-row{display:grid;grid-template-columns:34px 1fr 58px 58px;gap:8px;align-items:center;padding:8px 10px;font-family:Plex,monospace;font-size:11px}
  .skill-row img{width:28px;height:28px;border-radius:6px}
  .stat{padding:10px}
  .stat-row{display:grid;grid-template-columns:1fr 1.1fr 1fr;padding:7px 8px;font-family:Chakra,system-ui;font-size:12px;text-align:center}
  @media(max-width:1200px){.grid{grid-template-columns:1fr}.app{min-height:0}}

  /* A: close to in-game blue deployment menu */
  .a.variant{background:#0e3d6e}.a .label{background:#154e89;color:white;border-bottom:4px solid #2c9be4}
  .a .app{background:#113f70;color:#dff6ff}
  .a .scenario,.a .panel,.a .forecast{background:#d9efff;border:3px solid #64b9ef;color:#31506b}
  .a .top{background:#0b3159;border-radius:14px;padding:10px}.a .badge{color:white}.a .run{background:linear-gradient(#55b8ff,#1885ed);color:white;box-shadow:0 4px 0 #075dae}
  .a .tool,.a .chev,.a .vs{background:linear-gradient(#52b9ff,#1781dc);border:2px solid #9fe0ff;color:white}.a .role{background:#67bbef}.a .role span.on{background:#dff7ff}
  .a .form-row,.a .hero{background:#cae9fb;border:2px solid #67b9e8}.a .class-icon{background:#77c1ee;color:white}.a .track{background:#587184}.a .track i{background:#36df58}.a .total,.a .num{color:#0d568d}
  .a .winbar{border:2px solid #54b7e6}.a .win{background:#49c6dd;color:#073c55}.a .loss{background:#ff9a3a;color:#552400}.a .mini-bars i:nth-child(odd){background:linear-gradient(#6be9ff,#2089c5)}.a .mini-bars i:nth-child(even){background:linear-gradient(#ffbd66,#e07025)}

  /* B: battle-report parchment with red/blue headers */
  .b.variant{background:#b78b65}.b .label{background:#d9944d;color:white;border-bottom:3px solid #9e6533}
  .b .app{background:#ead9c5;color:#6a5647}
  .b .scenario,.b .panel,.b .forecast,.b .stat,.b .skill{background:#f4eadc;border:2px solid #caa98c;color:#6a5647}
  .b .top{background:#f7efe5;border:2px solid #caa98c;border-radius:12px;padding:10px}.b .badge{color:#8d5b31}.b .run{background:linear-gradient(#f8bf65,#d67e2e);color:white;text-shadow:0 1px #73401d}
  .b .tool,.b .chev,.b .vs{background:#d19b64;color:white;border:1px solid #9d714c}.b .role{background:#e0c2a6}.b .role span.on{background:white}
  .b .form-row,.b .hero{background:#fff6ec;border:1px solid #d5b699}.b .class-icon{background:#e2ac73;color:white}.b .track{background:#9fb2bd}.b .track i{background:#57c361}.b .total,.b .num{color:#8e5d32}
  .b .winbar{border:1px solid #caa98c}.b .win{background:linear-gradient(90deg,#f06767,#5e94d0);color:white}.b .loss{background:#ead3bd;color:#765847}.b .skill-side:first-child{background:linear-gradient(110deg,#eb5e5e 0 54%,#6d9ed4 54%)}.b .skill-side:last-child{background:#6d9ed4;color:white}
  .b .skill-row:nth-child(odd),.b .stat-row:nth-child(odd){background:#ead8c3}.b .skill-row:nth-child(even),.b .stat-row:nth-child(even){background:#f8eee3}

  /* C: hybrid official/wiki frost-gold UI */
  .c.variant{background:#edf8ff}.c .label{background:#123c67;color:white;border-bottom:4px solid #f4ad3c}
  .c .app{background:linear-gradient(#f8fdff,#dceff8);color:#173b5f}
  .c .scenario,.c .panel,.c .forecast,.c .stat,.c .skill{background:linear-gradient(#fff,#e4f6ff);border:2px solid #8dd2ef;color:#173b5f;box-shadow:inset 0 1px #fff}
  .c .top{background:#143b63;border-radius:14px;padding:10px}.c .badge{color:#fff}.c .run{background:linear-gradient(#ffd66e,#ee9b31);color:#3d2100;box-shadow:0 4px 0 #a66020}
  .c .tool,.c .chev,.c .vs{background:linear-gradient(#fff,#c9efff);border:2px solid #7fc8e5;color:#0e5a91}.c .role{background:#d5f3ff;border:1px solid #87d0ef}.c .role span.on{background:white}
  .c .form-row,.c .hero{background:linear-gradient(#fff,#edf9ff);border:2px solid #a2d9ee}.c .class-icon{background:linear-gradient(#2375ae,#155683);color:white}.c .track{background:#c8e1eb}.c .track i{background:linear-gradient(90deg,#38bcd2,#91eff7)}.c .total,.c .num{color:#0f558a}
  .c .winbar{border:2px solid #8fd4ed}.c .win{background:#46c5db;color:#07394f}.c .loss{background:#f29338;color:#4a2300}.c .mini-bars i:nth-child(odd){background:linear-gradient(#72eff7,#2898c4)}.c .mini-bars i:nth-child(even){background:linear-gradient(#ffbe68,#e17c2b)}
</style>
</head>
<body>
<div class="wrap">
  <h1 class="intro">Whiteout Battle Predictor - Style Variations</h1>
  <div class="grid">
    <section class="variant a">
      <div class="label">A - In-Game Deployment Blue</div>
      <div class="app"></div>
    </section>
    <section class="variant b">
      <div class="label">B - Battle Report Parchment</div>
      <div class="app"></div>
    </section>
    <section class="variant c">
      <div class="label">C - Frost Gold Hybrid</div>
      <div class="app"></div>
    </section>
  </div>
</div>
<template id="mock">
  <div class="top"><div class="badge">Whiteout Tactics</div><button class="run">Run</button></div>
  <div class="scenario"><b>Scenario 1</b><div class="tools"><span class="tool"><img src="assets/ui/rename-pen.png"></span><span class="tool"><img src="assets/ui/save-down.png"></span><span class="tool"><img src="assets/ui/load-up.png"></span></div></div>
  <div class="panel">
    <div class="side">
      <div class="side-name">My Side<div class="role"><span class="on"><img src="assets/ui/rally-swords.png"></span><span><img src="assets/ui/garrison-shield.png"></span></div></div>
      <div class="vs">VS</div>
      <div class="side-name">Enemy<div class="role"><span><img src="assets/ui/rally-swords.png"></span><span class="on"><img src="assets/ui/garrison-shield.png"></span></div></div>
    </div>
    <div class="title">Troops &amp; Formation <span class="chev">v</span></div>
    <div class="form-row"><span class="class-icon">I</span><span class="track"><i style="width:50%"></i></span><span class="pct">50.0%</span></div>
    <div class="form-row"><span class="class-icon">L</span><span class="track"><i style="width:20%"></i></span><span class="pct">20.0%</span></div>
    <div class="form-row"><span class="class-icon">M</span><span class="track"><i style="width:30%"></i></span><span class="pct">30.0%</span></div>
    <div class="total">100%</div>
    <div class="title">Lead Heroes <span class="chev">v</span></div>
    <div class="heroes">
      <div class="hero-stack"><div class="hero"><img src="avatars/Hank.png">Hank</div><div class="hero"><img src="avatars/Estrella.png">Estrella</div><div class="hero"><img src="avatars/Viveca.png">Viveca</div></div>
      <div class="mid">Infantry<br><br>Lancers<br><br>Marksmen</div>
      <div class="hero-stack"><div class="hero"><img src="avatars/Hank.png">Hank</div><div class="hero"><img src="avatars/Estrella.png">Estrella</div><div class="hero"><img src="avatars/Viveca.png">Viveca</div></div>
    </div>
    <div class="title">Joiner Heroes <span class="chev">v</span></div>
    <div class="joiners"><div class="hero"><img src="avatars/Mia.png">Mia</div><div class="hero"><img src="avatars/Jessie.png">Jessie</div><div class="hero"><img src="avatars/Blanchette.jpg">Blanchette</div><div class="hero"><img src="avatars/Wu%20Ming.jpg">Wu Ming</div></div>
  </div>
  <div class="forecast">
    <div class="title">Forecast</div>
    <div class="prob"><div class="num">58%</div><div class="winbar"><span class="win" style="width:58%">Win</span><span class="loss" style="width:42%">Loss</span></div></div>
    <div class="mini-bars"><i style="height:35%"></i><i style="height:50%"></i><i style="height:42%"></i><i style="height:75%"></i><i style="height:54%"></i><i style="height:90%"></i></div>
  </div>
  <div class="skill">
    <div class="skill-head"><div class="skill-side"><img src="avatars/Hank.png">Hank</div><div class="skill-side"><img src="avatars/Viveca.png">Viveca</div></div>
    <div class="skill-row"><img src="assets/hero_skills/hank-2/skill_3.png"><b>Raging Force</b><span>1</span><span>-</span></div>
    <div class="skill-row"><img src="assets/troop_skills/crystal_shield.png"><b>Crystal Shield</b><span>5</span><span>12K</span></div>
  </div>
  <div class="stat">
    <div class="title">Stat Bonuses</div>
    <div class="stat-row"><span>+3987.3%</span><b>Infantry Attack</b><span>+3862.6%</span></div>
    <div class="stat-row"><span>+2977.5%</span><b>Infantry Defense</b><span>+3231.0%</span></div>
    <div class="stat-row"><span>+2802.9%</span><b>Lancer Lethality</b><span>+2612.2%</span></div>
  </div>
</template>
<script>
  document.querySelectorAll('.app').forEach(app=>app.append(document.querySelector('#mock').content.cloneNode(true)));
</script>
</body>
</html>
